name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to accomplish?
      placeholder: I want to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or UI you would like.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Router/data source support
        - Graph Map
        - Statistics
        - Connection Log
        - Devices
        - Threat detection
        - Notifications
        - Setup/docs
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or alternate design you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, diagrams, or links if useful. Please redact private network details.
