name: Bug report
description: Report a reproducible problem in EgressView.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Please do not include real router passwords, tokens, MAC addresses, public IPs, or private network details that you do not want to share.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the problem briefly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that triggers the issue.
      placeholder: |
        1. Start EgressView with ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Error messages and screenshots are helpful if redacted.
    validations:
      required: true
  - type: dropdown
    id: setup
    attributes:
      label: Setup
      options:
        - Yamaha RTX only
        - Yamaha RTX + ASUS AP
        - Yamaha RTX + data sources
        - Development/test environment without router
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Release version, commit hash, or branch.
      placeholder: main @ abc1234
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: v20.x
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste only redacted logs. Remove tokens, passwords, real IPs, MAC addresses, and hostnames.
      render: text
