# GitHub Labels
# Apply with: gh label create --force ... or a labels-sync action

- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"

- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request"

- name: "documentation"
  color: "0075ca"
  description: "Improvements or additions to documentation"

- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers — no deep codebase knowledge required"

- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed — contributions welcome"

- name: "question"
  color: "d876e3"
  description: "Further information is requested"

- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or pull request already exists"

- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"

- name: "security"
  color: "e4e669"
  description: "Security-related issue or fix"

- name: "router: yamaha"
  color: "f9d0c4"
  description: "Yamaha RTX router integration"

- name: "router: asus"
  color: "f9d0c4"
  description: "ASUS router / AP integration"

- name: "mcp"
  color: "bfd4f2"
  description: "Model Context Protocol (MCP) server"
