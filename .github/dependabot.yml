version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # Batch all non-major updates into one PR to reduce noise.
      # Security updates still get their own PR from GitHub automatically.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions (ci.yml etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions:
        patterns:
          - "*"
